<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Confluence 2026</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>
<nav id="navbar" class="scrolled">
  <a class="nav-logo" href="index.html">Confluence 2026</a>
  <ul class="nav-links">
    <li><a href="cart.html" class="nav-link">← Back to Cart</a></li>
  </ul>
</nav>

<section id="form-section">
  <div class="form-layout checkout-layout">
    <div class="form-card">
      <div class="form-section-label">Your Details</div>
      <form id="checkout-form">
        <div class="form-grid">
          <div class="form-group full">
            <label class="form-label" for="full_name">Full Name <span class="required">*</span></label>
            <input class="form-input" id="full_name" name="full_name" type="text" data-validate="required">
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email <span class="required">*</span></label>
            <input class="form-input" id="email" name="email" type="email" data-validate="required,email">
          </div>
          <div class="form-group">
            <label class="form-label" for="phone">Phone <span class="required">*</span></label>
            <input class="form-input" id="phone" name="phone" type="tel" data-validate="required,phone">
          </div>
          <div class="form-group full">
            <label class="form-label" for="college">College / Company <span class="required">*</span></label>
            <input class="form-input" id="college" name="college" type="text" data-validate="required">
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:1.5rem;">Pay with Razorpay</button>
      </form>
    </div>

    <div class="form-card checkout-summary-card" id="checkout-order-summary"></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/toast.js"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/forms.js"></script>
<script src="js/checkout.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
